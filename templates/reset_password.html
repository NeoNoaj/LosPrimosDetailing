<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - LosPrimosDetailing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="cuerpo-autenticacion">
    <div class="contenedor-autenticacion">
        <div class="tarjeta-premium tarjeta-autenticacion">
            <header>
                <h1>LosPrimosDetailing</h1>
                <p class="subtitulo">Nueva Contraseña</p>
            </header>

            <section class="messages">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="mensaje-flash {{ category }}">
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}
            </section>

            <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST" class="formulario-vertical">
                <div class="grupo-formulario">
                    <label for="password">Nueva Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="grupo-formulario">
                    <label for="confirm_password">Confirmar Nueva Contraseña</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••"
                        required>
                </div>
                <button type="submit" class="btn-primario btn-bloque">Restablecer Contraseña</button>
            </form>

            <footer>
                <p><a href="{{ url_for('auth.login') }}">Volver al inicio de sesión</a></p>
            </footer>
        </div>
    </div>
</body>

</html>
